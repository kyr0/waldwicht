services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
      - "3000:8080"
    environment:
      ENABLE_PERSISTENT_CONFIG: "false"
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: "http://host.docker.internal:8430/v1"
      OPENAI_API_KEY: "dummy"
      TASK_MODEL_EXTERNAL: "prism-ml/Waldwicht-8B-mlx-1bit"

      ENABLE_OLLAMA_API: "false"

      OFFLINE_MODE: "true"
      HF_HUB_OFFLINE: "1"
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui: